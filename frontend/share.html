<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileShare — Download File</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="share-wrapper">
    <div class="share-card" id="share-card">
      <div style="font-size:48px;margin-bottom:16px;">⏳</div>
      <p style="color:var(--muted);">Loading file info…</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    function fileIcon(mime) {
      if (!mime) return '📄';
      if (mime.startsWith('image/')) return '🖼️';
      if (mime.startsWith('video/')) return '🎬';
      if (mime.startsWith('audio/')) return '🎵';
      if (mime.includes('pdf')) return '📕';
      if (mime.includes('zip') || mime.includes('compressed')) return '📦';
      if (mime.startsWith('text/')) return '📃';
      return '📄';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatExpiry(ts) {
      if (!ts) return null;
      const d = new Date(ts * 1000);
      return `Expires ${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;
    }

    async function loadInfo() {
      const card = document.getElementById('share-card');
      if (!token) {
        card.innerHTML = `<div style="font-size:48px;margin-bottom:16px;">❌</div><h2>Invalid Link</h2><p style="color:var(--muted);">This share link is not valid.</p>`;
        return;
      }

      try {
        const res = await fetch(`/api/files/shared/${token}/info`);
        if (res.status === 410) {
          card.innerHTML = `<div style="font-size:48px;margin-bottom:16px;">⏰</div><h2>Link Expired</h2><p style="color:var(--muted);">This share link has expired.</p>`;
          return;
        }
        if (!res.ok) {
          card.innerHTML = `<div style="font-size:48px;margin-bottom:16px;">❌</div><h2>Not Found</h2><p style="color:var(--muted);">This file doesn't exist or the link is invalid.</p>`;
          return;
        }
        const file = await res.json();
        const expiry = formatExpiry(file.share_expires);

        card.innerHTML = `
          <div class="file-big-icon">${fileIcon(file.mime_type)}</div>
          <h2>${escHtml(file.original_name)}</h2>
          <p class="meta">${formatSize(file.size)} &bull; Shared by <strong>${escHtml(file.username)}</strong></p>
          ${expiry ? `<p class="expires">⏱ ${expiry}</p>` : '<p class="expires" style="color:var(--muted)">No expiry</p>'}
          <button class="btn-download" onclick="downloadFile()">
            ⬇️ Download File
          </button>
          <p style="font-size:12px;color:var(--muted);margin-top:20px;">
            Powered by <a href="/">FileShare ☁️</a>
          </p>
        `;
      } catch {
        card.innerHTML = `<div style="font-size:48px;margin-bottom:16px;">⚠️</div><h2>Error</h2><p style="color:var(--muted);">Could not load file info. Please try again.</p>`;
      }
    }

    function downloadFile() {
      location.href = `/api/files/shared/${token}`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadInfo();
  </script>
</body>
</html>
