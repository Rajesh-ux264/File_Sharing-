<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileShare — Sign In</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="icon">☁️</span>
        <h1>FileShare</h1>
        <p>Secure cloud file sharing</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div class="tab-panel active" id="panel-login">
        <div class="error-msg" id="login-error"></div>
        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>

      <!-- REGISTER -->
      <div class="tab-panel" id="panel-register">
        <div class="error-msg" id="register-error"></div>
        <form id="register-form">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="johndoe" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Min. 6 characters" required />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) location.href = '/dashboard.html';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError(id) { document.getElementById(id).classList.remove('show'); }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      hideError('login-error');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) return showError('login-error', data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        location.href = '/dashboard.html';
      } catch { showError('login-error', 'Network error. Please try again.'); }
    });

    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      hideError('register-error');
      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) return showError('register-error', data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        location.href = '/dashboard.html';
      } catch { showError('register-error', 'Network error. Please try again.'); }
    });
  </script>
</body>
</html>
